apiVersion: v1
kind: ConfigMap
metadata:
  name: ai-quality-serving-observability
  labels:
    app.kubernetes.io/name: ai-quality-risk-classifier
    ai-quality/check-role: serving-telemetry-contract
data:
  MODEL_NAME: risk-classifier
  MODEL_ALIAS: candidate
  MODEL_VERSION: candidate-v2
  MODEL_THRESHOLD: "0.5"
  TELEMETRY_FIELDS: request_id,model_version,model_alias,score,threshold,prediction,latency_ms,validation_failure
  DEPLOYMENT_CHECK: candidate_model_deployment
