services:
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.12.2
    restart: unless-stopped
    command:
      - mlflow
      - server
      - --host
      - 0.0.0.0
      - --port
      - "5000"
      - --backend-store-uri
      - sqlite:////mlflow/mlflow.db
      - --default-artifact-root
      - /mlflow/artifacts
    ports:
      - "${MLFLOW_HOST_PORT:-5002}:5000"
    volumes:
      - mlflow-data:/mlflow
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000', timeout=2)"
      interval: 5s
      timeout: 3s
      retries: 30

  trainer:
    build:
      context: .
      args:
        UV_SYNC_GROUPS: "--group train"
    profiles:
      - train
    command: ["python", "train.py", "--repeat", "1"]
    environment:
      GIT_PYTHON_REFRESH: quiet
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MODEL_PATH: /app/models/latest_model.joblib
      METADATA_PATH: /app/models/latest_metadata.json
    volumes:
      - ../../data:/app/data:ro
      - ./models:/app/models
    depends_on:
      mlflow:
        condition: service_healthy

  trainer-loop:
    build:
      context: .
      args:
        UV_SYNC_GROUPS: "--group train"
    profiles:
      - train-loop
      - continuous
    restart: unless-stopped
    command: ["python", "train.py", "--repeat", "0", "--interval", "300"]
    environment:
      GIT_PYTHON_REFRESH: quiet
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MODEL_PATH: /app/models/latest_model.joblib
      METADATA_PATH: /app/models/latest_metadata.json
    volumes:
      - ../../data:/app/data:ro
      - ./models:/app/models
    depends_on:
      mlflow:
        condition: service_healthy

  api:
    build: .
    restart: unless-stopped
    env_file:
      - path: ../../.env
        required: false
    environment:
      APP_CONFIG_PATH: /app/config/app.local.json
    ports:
      - "${API_HOST_PORT:-8000}:8000"
    volumes:
      - ../../data:/app/data:ro
      - ./models:/app/models
      - ./events:/app/events
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2)"
      interval: 5s
      timeout: 3s
      retries: 30

  traffic:
    build: .
    profiles:
      - traffic
    command:
      - python
      - send_fake_traffic.py
      - --api-url
      - http://api:8000
      - --count
      - "30"
      - --sleep
      - "0.2"
    volumes:
      - ../../data:/app/data:ro
      - ./events:/app/events
    depends_on:
      api:
        condition: service_healthy

  traffic-loop:
    build: .
    profiles:
      - traffic-loop
      - continuous
    restart: unless-stopped
    command:
      - python
      - send_fake_traffic.py
      - --api-url
      - http://api:8000
      - --loop
      - --sleep
      - "2"
    volumes:
      - ../../data:/app/data:ro
      - ./events:/app/events
    depends_on:
      api:
        condition: service_healthy

  alloy:
    image: grafana/alloy:latest
    profiles:
      - observability
    restart: unless-stopped
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/var/lib/alloy/data
      - /etc/alloy/config.alloy
    env_file:
      - path: ../../.env
        required: false
    ports:
      - "${ALLOY_HOST_PORT:-12345}:12345"
      - "${OTLP_HTTP_HOST_PORT:-4318}:4318"
      - "${OTLP_GRPC_HOST_PORT:-4317}:4317"
    volumes:
      - ./alloy.cloud.example.alloy:/etc/alloy/config.alloy:ro
      - ./events:/var/lib/simple-mlops/events:ro
    depends_on:
      api:
        condition: service_healthy

volumes:
  mlflow-data:
