services:
  risk-api:
    environment:
      AIQA_API_OTLP_ENDPOINT: http://alloy:4318
    depends_on:
      alloy:
        condition: service_started

  traffic-generator:
    environment:
      AIQA_TRAFFIC_OTLP_ENDPOINT: http://alloy:4318
    depends_on:
      alloy:
        condition: service_started

  alloy:
    image: grafana/alloy@sha256:51aeb9d829239345070619dad3edd6873186f913c84f45b365b74574fcb38ec0
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/var/lib/alloy/data
      - /etc/alloy/config.alloy
    ports:
      - "12345:12345"
    volumes:
      - ./alloy/config.alloy:/etc/alloy/config.alloy:ro
      - ./secrets/alloy:/var/run/secrets/aiqa/alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - alloy-data:/var/lib/alloy/data
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

volumes:
  alloy-data:
