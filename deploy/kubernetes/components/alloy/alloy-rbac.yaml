apiVersion: v1
kind: ServiceAccount
metadata:
  name: alloy
  namespace: tta-aiqa
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: alloy-discovery
  namespace: tta-aiqa
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "services", "endpoints"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: alloy-discovery
  namespace: tta-aiqa
subjects:
  - kind: ServiceAccount
    name: alloy
    namespace: tta-aiqa
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: alloy-discovery
