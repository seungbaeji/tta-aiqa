apiVersion: apps/v1
kind: Deployment
metadata:
  name: alloy
  namespace: tta-aiqa
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: alloy
  template:
    metadata:
      labels:
        app.kubernetes.io/name: alloy
        app.kubernetes.io/part-of: tta-aiqa
    spec:
      serviceAccountName: alloy
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: alloy
          image: grafana/alloy@sha256:51aeb9d829239345070619dad3edd6873186f913c84f45b365b74574fcb38ec0
          args:
            - run
            - --server.http.listen-addr=0.0.0.0:12345
            - --storage.path=/var/lib/alloy/data
            - /etc/alloy/config.alloy
          ports:
            - name: http
              containerPort: 12345
            - name: otlp-http
              containerPort: 4318
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: config
              mountPath: /etc/alloy
              readOnly: true
            - name: grafana-cloud
              mountPath: /var/run/secrets/aiqa/alloy
              readOnly: true
            - name: data
              mountPath: /var/lib/alloy/data
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: config
          configMap:
            name: alloy-config
        - name: grafana-cloud
          secret:
            secretName: alloy-grafana-cloud
            defaultMode: 256
        - name: data
          emptyDir: {}
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: alloy
  namespace: tta-aiqa
spec:
  selector:
    app.kubernetes.io/name: alloy
  ports:
    - name: otlp-http
      port: 4318
      targetPort: otlp-http
    - name: http
      port: 12345
      targetPort: http
