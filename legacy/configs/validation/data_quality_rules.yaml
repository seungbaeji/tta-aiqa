allowed_labels:
  - high_risk
  - low_risk

minimum_positive_support: 30
maximum_missing_ratio: 5.0

valid_ranges:
  heart_rate:
    min: 1
    max: 250
  respiratory_rate:
    min: 1
    max: 80
  body_temperature:
    min: 30
    max: 45
  oxygen_saturation:
    min: 0
    max: 100
  systolic_blood_pressure:
    min: 50
    max: 250
  diastolic_blood_pressure:
    min: 30
    max: 150
  age:
    min: 0
    max: 120
  weight_kg:
    min: 1
    max: 300
  height_m:
    min: 0.5
    max: 2.5

