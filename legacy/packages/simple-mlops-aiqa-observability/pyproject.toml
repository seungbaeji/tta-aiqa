[project]
name = "aiqa-observability"
version = "0.1.0"
description = "Event, metric, and trace helpers for the AIQA Simple MLOps workspace"
requires-python = ">=3.11"
dependencies = [
  "aiqa-core",
  "pandas>=2.2",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/aiqa_observability"]
