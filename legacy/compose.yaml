name: ttamlops-ai-quality

services:
  serving-api:
    build:
      context: .
      dockerfile: demos/ch03_docker_kubernetes/Dockerfile
    profiles:
      - serving
    environment:
      API_HOST: 0.0.0.0
      API_PORT: 8000
      MODEL_PATH: artifacts/models/chapter_02_baseline.pkl
      MODEL_VERSION: v1
      MODEL_THRESHOLD: 0.5
      EVENT_LOG_PATH: artifacts/logs/prediction_events.jsonl
    ports:
      - "8000:8000"
    volumes:
      - ./artifacts:/app/artifacts
      - ./configs:/app/configs:ro

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.12.2
    command:
      - mlflow
      - server
      - --host
      - 0.0.0.0
      - --port
      - "5000"
      - --backend-store-uri
      - sqlite:////mlflow/mlflow.db
      - --default-artifact-root
      - /mlflow/artifacts
    ports:
      - "5000:5000"
    volumes:
      - mlflow-data:/mlflow

  loki:
    image: grafana/loki:3.1.0
    command:
      - -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"
    volumes:
      - loki-data:/loki

  grafana:
    image: grafana/grafana-oss:11.1.0
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_USERS_DEFAULT_THEME: light
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - loki

volumes:
  grafana-data:
  loki-data:
  mlflow-data:
