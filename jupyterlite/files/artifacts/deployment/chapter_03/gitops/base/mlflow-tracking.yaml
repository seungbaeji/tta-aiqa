apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ai-quality-models
  labels:
    app.kubernetes.io/name: mlflow-tracking
    app.kubernetes.io/component: model-registry
    ai-quality/course-chapter: "03"
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow-tracking
  labels:
    app.kubernetes.io/name: mlflow-tracking
    app.kubernetes.io/component: model-registry
    ai-quality/course-chapter: "03"
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mlflow-tracking
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mlflow-tracking
        app.kubernetes.io/component: model-registry
    spec:
      containers:
        - name: mlflow
          image: ghcr.io/mlflow/mlflow:v2.12.2
          args:
            - mlflow
            - server
            - --host
            - 0.0.0.0
            - --port
            - "5000"
            - --backend-store-uri
            - sqlite:////mlflow/mlflow.db
            - --default-artifact-root
            - file:///mlflow/artifacts
          ports:
            - name: http
              containerPort: 5000
          volumeMounts:
            - name: model-store
              mountPath: /mlflow
      volumes:
        - name: model-store
          persistentVolumeClaim:
            claimName: ai-quality-models
---
apiVersion: v1
kind: Service
metadata:
  name: mlflow-tracking
  labels:
    app.kubernetes.io/name: mlflow-tracking
    app.kubernetes.io/component: model-registry
    ai-quality/course-chapter: "03"
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: mlflow-tracking
  ports:
    - name: http
      port: 5000
      targetPort: http
