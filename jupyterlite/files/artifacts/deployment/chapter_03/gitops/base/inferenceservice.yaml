apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: ai-quality-risk-classifier
  labels:
    app.kubernetes.io/name: ai-quality-risk-classifier
    app.kubernetes.io/component: inference-service
    app.kubernetes.io/part-of: model-deployment-check
    ai-quality/model-name: risk-classifier
    ai-quality/model-alias: candidate
    ai-quality/managed-by: argocd
    ai-quality/deployment-check: candidate-model
  annotations:
    ai-quality/mlflow-model-uri: models:/risk-classifier@candidate
    ai-quality/observability-contract: request_id,model_version,score,threshold,prediction,latency_ms,validation_failure
    argocd.argoproj.io/sync-wave: "10"
spec:
  predictor:
    sklearn:
      protocolVersion: v2
      storageUri: pvc://ai-quality-models/artifacts/risk-classifier/candidate
