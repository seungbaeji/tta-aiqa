log_fields:
  - timestamp
  - request_id
  - trace_id
  - model_version
  - score
  - threshold
  - prediction
  - latency_ms
  - status_code
  - validation_failure

metric_names:
  request_count: ai_quality_request_total
  error_count: ai_quality_error_total
  latency_average: ai_quality_latency_average_ms
  validation_failure_count: ai_quality_validation_failure_total
  score_average: ai_quality_score_average
  high_risk_rate: ai_quality_high_risk_rate
  input_mean_delta: ai_quality_input_mean_delta
  score_average_delta: ai_quality_score_average_delta
  high_risk_rate_delta: ai_quality_high_risk_rate_delta

trace_fields:
  - trace_id
  - course_trace_id
  - request_id
  - span_name
  - model_version
  - validation_failure

quality_thresholds:
  error_rate_warning: 0.05
  latency_average_warning_ms: 250
  validation_failure_warning: 10
