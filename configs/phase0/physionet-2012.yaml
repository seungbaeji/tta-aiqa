schema_version: 1

source:
  records_dir: data/interim/physionet-2012/set-a
  archive_path: data/raw/physionet-2012/set-a.zip
  outcomes_path: data/raw/physionet-2012/Outcomes-a.txt
  expected_record_count: 4000
  expected_death_count: 554
  archive_sha256: 1433638192fda622e8bb11a4559b8af2dbb1c69f0e1c3b5b606cc12aabd0a4c5
  outcomes_sha256: 2613ea60ccda29f87571a7d6b09ad130858a8ccd66325bd073365925026883c2
  target_column: In-hospital_death
  blocked_outcome_columns:
    - SAPS-I
    - SOFA
    - Length_of_stay
    - Survival

aggregation:
  missing_sentinel: -1.0
  static_parameters:
    Age: age
    Gender: gender
    Height: height
    ICUType: icu_type
  series_parameters:
    Weight:
      output_name: weight
      statistics: [min, max, mean, last, count]
    HR:
      output_name: heart_rate
      statistics: [min, max, mean, last, count]
    Temp:
      output_name: temperature
      statistics: [min, max, mean, last, count]
    GCS:
      output_name: gcs
      statistics: [min, max, mean, last, count]
    BUN:
      output_name: bun
      statistics: [min, max, mean, last, count]
    Creatinine:
      output_name: creatinine
      statistics: [min, max, mean, last, count]
    HCT:
      output_name: hematocrit
      statistics: [min, max, mean, last, count]
    Platelets:
      output_name: platelets
      statistics: [min, max, mean, last, count]
    WBC:
      output_name: wbc
      statistics: [min, max, mean, last, count]
    Na:
      output_name: sodium
      statistics: [min, max, mean, last, count]
    K:
      output_name: potassium
      statistics: [min, max, mean, last, count]
    Glucose:
      output_name: glucose
      statistics: [min, max, mean, last, count]
    Urine:
      output_name: urine
      statistics: [min, max, mean, last, count, sum]
    NISysABP:
      output_name: non_invasive_systolic_bp
      statistics: [min, max, mean, last, count]
    NIDiasABP:
      output_name: non_invasive_diastolic_bp
      statistics: [min, max, mean, last, count]
    NIMAP:
      output_name: non_invasive_map
      statistics: [min, max, mean, last, count]
    pH:
      output_name: ph
      statistics: [min, max, mean, last, count]
    PaO2:
      output_name: pao2
      statistics: [min, max, mean, last, count]
    FiO2:
      output_name: fio2
      statistics: [min, max, mean, last, count]
    MechVent:
      output_name: mechanical_ventilation
      statistics: [max, last, count]
    Lactate:
      output_name: lactate
      statistics: [min, max, mean, last, count]

split:
  random_seed: 42
  train_ratio: 0.60
  valid_ratio: 0.15
  test_ratio: 0.15
  release_holdout_ratio: 0.10

evaluation:
  cv_splits: 5
  cv_repeats: 3
  bootstrap_iterations: 1000
  threshold_min: 0.05
  threshold_max: 0.95
  threshold_step: 0.01
  baseline_profile: logistic_unweighted
  minimum_pr_auc_lift_over_dummy: 0.02
  recall_guardrail: 0.55
  recall_safety_margin: 0.05
  minimum_recall_bootstrap_lower: 0.45
  minimum_precision: 0.20
  minimum_pr_auc_delta_vs_baseline: 0.0
  minimum_fn_reduction_vs_baseline: 15
  candidate_a_minimum_recall: 0.10
  candidate_a_profiles:
    - logistic_unweighted
    - random_forest_unweighted
  candidate_b_profiles:
    - logistic_balanced
    - random_forest_balanced
  models:
    - name: dummy_prior
      kind: dummy
      params:
        strategy: prior
    - name: logistic_unweighted
      kind: logistic_regression
      params:
        C: 1.0
        class_weight: null
        max_iter: 2000
    - name: logistic_balanced
      kind: logistic_regression
      params:
        C: 1.0
        class_weight: balanced
        max_iter: 2000
    - name: random_forest_unweighted
      kind: random_forest
      params:
        n_estimators: 400
        min_samples_leaf: 8
        max_features: sqrt
        class_weight: null
        n_jobs: -1
    - name: random_forest_balanced
      kind: random_forest
      params:
        n_estimators: 400
        min_samples_leaf: 8
        max_features: sqrt
        class_weight: balanced_subsample
        n_jobs: -1

outputs:
  artifact_dir: artifacts/phase0
  evidence_dir: reference/evidence/phase0
