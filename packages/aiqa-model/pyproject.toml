[project]
name = "aiqa-model"
version = "0.2.0"
description = "Model lifecycle bounded context for AIQA V2"
requires-python = ">=3.11,<3.12"
dependencies = [
  "aiqa-core",
  "joblib>=1.4",
  "mlflow>=3.1,<4",
  "numpy>=1.26,<2.3",
  "pandas>=2.2",
  "pydantic>=2.7",
  "pyyaml>=6.0",
  "scikit-learn>=1.4",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/aiqa_model"]
