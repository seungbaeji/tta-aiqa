[project]
name = "aiqa-model"
version = "0.1.0"
description = "Training and tracking helpers for the AIQA Simple MLOps workspace"
requires-python = ">=3.11"
dependencies = [
  "aiqa-core",
  "joblib>=1.4",
  "pandas>=2.2",
  "scikit-learn>=1.4",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/aiqa_model"]
