[project]
name = "ttamlops-ai-quality"
version = "0.1.0"
description = "AI quality assurance and operations observability training package."
readme = "../../README.md"
requires-python = ">=3.11"
dependencies = [
    "numpy>=1.26,<2.3",
    "pandas>=2.2",
    "pydantic>=2.7",
    "pyyaml>=6.0",
]

[project.optional-dependencies]
model = [
    "matplotlib>=3.8",
    "scikit-learn>=1.4",
]
serving = [
    "fastapi>=0.110",
    "httpx>=0.27",
    "uvicorn[standard]>=0.29",
]
demo = [
    "great-expectations>=1.0",
    "mlflow>=2.12",
    "prometheus-client>=0.20",
    "setuptools>=69,<81",
]

[build-system]
requires = ["hatchling"]
build-backend = "ai_quality_build"
backend-path = ["build_backend"]

[tool.hatch.build.targets.wheel]
packages = ["src/ai_quality"]
