[project]
name = "aiqa-observability"
version = "0.3.0"
description = "Shared observability platform SDK for AIQA Python processes"
requires-python = ">=3.11,<3.12"
dependencies = [
  "fastapi>=0.110",
  "opentelemetry-exporter-otlp-proto-http>=1.27",
  "opentelemetry-instrumentation-fastapi>=0.48b0",
  "opentelemetry-sdk>=1.27",
  "pydantic>=2.7",
  "prometheus-client>=0.20",
  "pyyaml>=6.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/aiqa_observability"]
