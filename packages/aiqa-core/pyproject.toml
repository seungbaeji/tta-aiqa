[project]
name = "aiqa-core"
version = "0.2.0"
description = "Shared domain contracts for the AIQA V2 workspace"
requires-python = ">=3.11,<3.12"
dependencies = [
  "pydantic>=2.7",
  "pyyaml>=6.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/aiqa_core"]
